name: Test Email

on:
  workflow_dispatch:

jobs:
  run-email-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run email test
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python smtp_test.py
