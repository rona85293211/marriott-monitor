name: Test Email

on:
  workflow_dispatch:

jobs:
  run-email-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run email test
        run: python smtp_test.py
